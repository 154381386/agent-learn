services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: it-ticket-agent-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: it_ticket_agent
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d it_ticket_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgvector-data:
