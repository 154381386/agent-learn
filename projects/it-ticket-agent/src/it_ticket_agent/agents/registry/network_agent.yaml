version: 1
enabled: true
implementation: it_ticket_agent.agents.network.NetworkAgent
routing:
  enabled: true
  priority: 40
descriptor:
  agent_name: network_agent
  domain: network
  display_name: Network Agent
  description: 负责排查 DNS、Ingress、VPC 连通性和负载均衡相关问题。
  required_fields:
    - name: service
      type: string
      description: 需要排查的服务名
      required: true
      priority: critical
  capabilities:
    - dns_investigation
    - ingress_routing_investigation
    - vpc_connectivity_investigation
    - load_balancer_investigation
  routing_keywords:
    - dns
    - 域名
    - ingress
    - vpc
    - 网络
    - route
    - lb
  tool_names:
    - inspect_dns_resolution
    - inspect_ingress_route
    - inspect_vpc_connectivity
    - inspect_load_balancer_status
