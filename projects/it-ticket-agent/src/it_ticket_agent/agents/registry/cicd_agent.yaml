version: 1
enabled: true
implementation: it_ticket_agent.agents.cicd.CICDAgent
routing:
  enabled: true
  priority: 10
descriptor:
  agent_name: cicd_agent
  domain: cicd
  display_name: CICD Agent
  description: 诊断构建、流水线、发布和回滚相关问题。
  required_fields:
    - name: service
      type: string
      description: 需要排查的服务名
      required: true
      priority: critical
  capabilities:
    - deployment_diagnosis
    - pipeline_analysis
    - rollback_recommendation
  routing_keywords:
    - 发版
    - 发布
    - 回滚
    - 构建
    - 流水线
    - deploy
    - pipeline
    - gitlab
    - jenkins
  tool_names:
    - check_recent_deployments
    - check_pipeline_status
    - get_deployment_status
    - check_service_health
    - check_recent_alerts
    - check_canary_status
    - inspect_build_failure_logs
    - get_rollback_history
    - get_git_commit_history
    - get_change_records
    - check_pod_status
    - search_knowledge_base
