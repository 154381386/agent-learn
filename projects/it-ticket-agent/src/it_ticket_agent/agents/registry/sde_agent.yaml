version: 1
enabled: false
implementation: it_ticket_agent.agents.sde.SDEAgent
routing:
  enabled: false
  priority: 30
descriptor:
  agent_name: sde_agent
  domain: sde
  display_name: SDE Agent
  description: 负责排查资源开通失败、K8s 集群拉起失败和机器开通失败等问题。
  required_fields:
    - name: service
      type: string
      description: 需要排查的服务名
      required: true
      priority: critical
  capabilities:
    - resource_provisioning_investigation
    - cluster_bootstrap_investigation
    - machine_provisioning_investigation
  routing_keywords:
    - 资源开通
    - provision
    - cluster
    - 集群
    - 机器开通
    - ecs
  tool_names:
    - investigate_resource_provisioning
    - inspect_cluster_bootstrap
    - inspect_machine_provisioning
    - get_quota_status
