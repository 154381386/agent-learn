version: 1
name: pod-crash
description: Pod 崩溃 / 重启排查技能包
category:
  name: k8s
  description: Kubernetes 集群与工作负载诊断
  skill_count: 6
  match_keywords:
    - pod
    - crash
    - crashloop
    - oom
    - oomkilled
    - 崩溃
    - 重启
skills:
  - name: diagnose_pod_crash
    params: "(service, namespace)"
    description: Pod 崩溃 / CrashLoop / OOM 场景的一体化 SOP 排查
    risk_level: low
    category: k8s
    executor: diagnose_pod_crash
    planning_mode: llm_parallel
    tool_names:
      - check_pod_status
      - inspect_pod_events
      - inspect_pod_logs
      - inspect_jvm_memory
      - inspect_cpu_saturation
      - get_quota_status
      - check_service_health
    when_to_use: 适用于 Pod 反复重启、CrashLoopBackOff、OOMKilled、探针失败等场景
    sop_summary: 先看 Pod 状态，再看事件与日志，再检查 JVM/CPU/Quota 等资源信号，最后汇总统一判断
