<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F766E"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97706"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .laneTitle { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .nodeTitle { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .nodeText { font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 600 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
      .lane { fill: #F8FAFC; stroke: #E2E8F0; stroke-width: 1.2; }
      .node { fill: white; stroke: #CBD5E1; stroke-width: 1.4; rx: 16; }
      .nodeBlue { fill: #EFF6FF; stroke: #93C5FD; stroke-width: 1.6; rx: 16; }
      .nodeTeal { fill: #F0FDFA; stroke: #99F6E4; stroke-width: 1.6; rx: 16; }
      .nodeOrange { fill: #FFF7ED; stroke: #FDBA74; stroke-width: 1.6; rx: 16; }
      .nodeSlate { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.6; rx: 16; }
      .mainArrow { stroke: #2563EB; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .supportArrow { stroke: #0F766E; stroke-width: 2.2; fill: none; marker-end: url(#arrowTeal); }
      .loopArrow { stroke: #D97706; stroke-width: 2.2; fill: none; marker-end: url(#arrowOrange); }
      .connector { stroke-dasharray: 6 6; opacity: 0.9; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="1040" fill="#FFFFFF"/>
  <text x="56" y="56" class="title">IT Ticket Agent - Project Data Flow</text>
  <text x="56" y="82" class="subtitle">react_tool_first | request flow, knowledge flow, tool execution, persistence, approval, and feedback resume</text>

  <rect x="48" y="118" width="250" height="860" class="lane" rx="20"/>
  <rect x="324" y="118" width="516" height="860" class="lane" rx="20"/>
  <rect x="866" y="118" width="308" height="860" class="lane" rx="20"/>
  <rect x="1200" y="118" width="352" height="860" class="lane" rx="20"/>

  <text x="68" y="150" class="laneTitle">1. User and Client</text>
  <text x="344" y="150" class="laneTitle">2. Orchestrator and React Graph</text>
  <text x="886" y="150" class="laneTitle">3. Knowledge and Tooling</text>
  <text x="1220" y="150" class="laneTitle">4. Persistence and HITL</text>

  <rect x="78" y="190" width="188" height="72" class="nodeBlue"/>
  <text x="102" y="220" class="nodeTitle">User</text>
  <text x="102" y="240" class="nodeText">submit issue, approve, reject,</text>
  <text x="102" y="255" class="nodeText">or provide feedback</text>

  <rect x="78" y="308" width="188" height="88" class="nodeBlue"/>
  <text x="102" y="338" class="nodeTitle">Frontend / Conversation API</text>
  <text x="102" y="358" class="nodeText">HTTP entry, thread binding,</text>
  <text x="102" y="373" class="nodeText">conversation state handoff</text>

  <rect x="364" y="182" width="198" height="68" class="nodeBlue"/>
  <text x="388" y="212" class="nodeTitle">Request Normalize</text>
  <text x="388" y="232" class="nodeText">TicketRequest shaping</text>

  <rect x="364" y="286" width="198" height="92" class="nodeBlue"/>
  <text x="388" y="316" class="nodeTitle">Slot Resolution</text>
  <text x="388" y="336" class="nodeText">entity extraction,</text>
  <text x="388" y="351" class="nodeText">clarification gate</text>

  <rect x="364" y="414" width="198" height="80" class="nodeBlue"/>
  <text x="388" y="444" class="nodeTitle">Retrieve RAG Context</text>
  <text x="388" y="464" class="nodeText">initial knowledge bundle</text>

  <rect x="604" y="182" width="196" height="80" class="nodeBlue"/>
  <text x="628" y="212" class="nodeTitle">SupervisorOrchestrator</text>
  <text x="628" y="232" class="nodeText">main runtime entrypoint</text>

  <rect x="604" y="298" width="196" height="84" class="nodeBlue"/>
  <text x="628" y="328" class="nodeTitle">React Graph</text>
  <text x="628" y="348" class="nodeText">ticket graph dispatcher</text>

  <rect x="604" y="420" width="196" height="68" class="nodeBlue"/>
  <text x="628" y="450" class="nodeTitle">Light Router</text>
  <text x="628" y="470" class="nodeText">direct answer vs diagnose</text>

  <rect x="364" y="548" width="198" height="76" class="nodeTeal"/>
  <text x="388" y="578" class="nodeTitle">Direct Answer</text>
  <text x="388" y="598" class="nodeText">FAQ / SOP fast path</text>

  <rect x="604" y="530" width="196" height="104" class="nodeBlue"/>
  <text x="628" y="560" class="nodeTitle">Supervisor Loop</text>
  <text x="628" y="580" class="nodeText">main diagnosis brain</text>
  <text x="628" y="595" class="nodeText">tool-first reasoning</text>

  <rect x="364" y="676" width="198" height="80" class="nodeSlate"/>
  <text x="388" y="706" class="nodeTitle">Context Collector</text>
  <text x="388" y="726" class="nodeText">rag merge, similar cases,</text>
  <text x="388" y="741" class="nodeText">snapshot enrichment</text>

  <rect x="604" y="676" width="196" height="80" class="nodeSlate"/>
  <text x="628" y="706" class="nodeTitle">Candidate Domains</text>
  <text x="628" y="726" class="nodeText">domain narrowing and</text>
  <text x="628" y="741" class="nodeText">candidate tool exposure</text>

  <rect x="604" y="788" width="196" height="92" class="nodeSlate"/>
  <text x="628" y="818" class="nodeTitle">Tool-First ReAct Loop</text>
  <text x="628" y="838" class="nodeText">observe, call tool, rank,</text>
  <text x="628" y="853" class="nodeText">early stop or continue</text>

  <rect x="364" y="826" width="198" height="76" class="nodeOrange"/>
  <text x="388" y="856" class="nodeTitle">Approval Gate</text>
  <text x="388" y="876" class="nodeText">high-risk action check</text>

  <rect x="364" y="926" width="198" height="76" class="nodeOrange"/>
  <text x="388" y="956" class="nodeTitle">Await User</text>
  <text x="388" y="976" class="nodeText">resume target + interrupt</text>

  <rect x="604" y="914" width="196" height="76" class="nodeOrange"/>
  <text x="628" y="944" class="nodeTitle">Execute Approved Action</text>
  <text x="628" y="964" class="nodeText">run approved mutation</text>

  <rect x="604" y="1000" width="196" height="0" opacity="0"/>

  <rect x="900" y="186" width="238" height="74" class="nodeTeal"/>
  <text x="924" y="216" class="nodeTitle">RAG Service Client</text>
  <text x="924" y="236" class="nodeText">external knowledge service</text>

  <rect x="900" y="290" width="238" height="74" class="nodeTeal"/>
  <text x="924" y="320" class="nodeTitle">Knowledge Service</text>
  <text x="924" y="340" class="nodeText">query + bundle normalization</text>

  <rect x="900" y="394" width="238" height="74" class="nodeTeal"/>
  <text x="924" y="424" class="nodeTitle">search_knowledge_base</text>
  <text x="924" y="444" class="nodeText">agent-driven knowledge probe</text>

  <rect x="900" y="510" width="238" height="80" class="nodeTeal"/>
  <text x="924" y="540" class="nodeTitle">Local Tool Runtime</text>
  <text x="924" y="560" class="nodeText">registered tools + action shim</text>

  <rect x="900" y="624" width="238" height="86" class="nodeTeal"/>
  <text x="924" y="654" class="nodeTitle">Tool Execution Middleware</text>
  <text x="924" y="674" class="nodeText">retry, timeout, approval,</text>
  <text x="924" y="689" class="nodeText">execution envelope</text>

  <rect x="900" y="742" width="238" height="76" class="nodeTeal"/>
  <text x="924" y="772" class="nodeTitle">Read-only Tools</text>
  <text x="924" y="792" class="nodeText">deploy, k8s, db, network</text>

  <rect x="900" y="846" width="238" height="76" class="nodeTeal"/>
  <text x="924" y="876" class="nodeTitle">Action Registry</text>
  <text x="924" y="896" class="nodeText">validated executable actions</text>

  <rect x="1234" y="180" width="278" height="68" class="nodeSlate"/>
  <text x="1258" y="210" class="nodeTitle">Session Store</text>
  <text x="1258" y="230" class="nodeText">session status and turns</text>

  <rect x="1234" y="272" width="278" height="68" class="nodeSlate"/>
  <text x="1258" y="302" class="nodeTitle">Checkpoint Store</text>
  <text x="1258" y="322" class="nodeText">resume and recovery state</text>

  <rect x="1234" y="364" width="278" height="68" class="nodeSlate"/>
  <text x="1258" y="394" class="nodeTitle">Process Memory Store</text>
  <text x="1258" y="414" class="nodeText">run summaries and flow events</text>

  <rect x="1234" y="456" width="278" height="68" class="nodeSlate"/>
  <text x="1258" y="486" class="nodeTitle">System Event Store</text>
  <text x="1258" y="506" class="nodeText">system-level event stream</text>

  <rect x="1234" y="548" width="278" height="68" class="nodeSlate"/>
  <text x="1258" y="578" class="nodeTitle">Incident Case Store</text>
  <text x="1258" y="598" class="nodeText">case memory and feedback</text>

  <rect x="1234" y="680" width="278" height="80" class="nodeOrange"/>
  <text x="1258" y="710" class="nodeTitle">Approval Store</text>
  <text x="1258" y="730" class="nodeText">approval records and state</text>

  <rect x="1234" y="794" width="278" height="80" class="nodeOrange"/>
  <text x="1258" y="824" class="nodeTitle">Human Approval</text>
  <text x="1258" y="844" class="nodeText">approve, reject, cancel</text>

  <rect x="1234" y="908" width="278" height="80" class="nodeOrange"/>
  <text x="1258" y="938" class="nodeTitle">Human Feedback Resume</text>
  <text x="1258" y="958" class="nodeText">verify root cause and reopen</text>

  <rect x="604" y="94" width="196" height="62" class="nodeBlue"/>
  <text x="628" y="124" class="nodeTitle">Finalize</text>
  <text x="628" y="144" class="nodeText">response aggregation</text>

